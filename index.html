<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesion | GSAR</title>
    <link rel="stylesheet" href="shared/css/login.css">
</head>
<body>

    <div class="login-wrapper">
        <img src="assets/logos/uleam-logo-png_seeklogo-315386.png" alt="Logo ULEAM" class="logo">
        
        <form id="loginForm" class="login-card">
            <h2>SISTEMA DE ACCESO</h2>
            
            <label for="email">USUARIO</label>
            <input type="email" id="email" placeholder="usuario@uleam.edu.ec" required>
            
            <label for="password">CONTRASEÑA</label>
            <input type="password" id="password" placeholder="••••••••" required minlength="6">
            
            <button type="submit">INICIAR SESIÓN</button>
        </form>

        <p class="footer-note">ULEAM - GSAR</p>
    </div>

    <script src="shared/js/storage.js"></script>
    <script src="shared/js/auth.js"></script>
    <script src="shared/js/login.js"></script>
</body>
</html>
