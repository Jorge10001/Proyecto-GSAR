<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema ULEAM</title>
    <link rel="stylesheet" href="shared/css/global.css">
    <link rel="stylesheet" href="shared/css/login.css">
</head>
<body>
    <div class="login-page">
        <aside class="login-branding">
            <img src="https://itinerario.uleam.edu.ec/img/logo_uleam.png" alt="Logo ULEAM" class="logo">
            <h1>Sistema de Gestión de Ascensos y Recategorizaciones</h1>
            <p>Plataforma institucional para la gestión transparente del talento humano de la Universidad Laica Eloy Alfaro de Manabí.</p>
            <footer>© 2026 ULEAM — Manta, Manabí, Ecuador</footer>
        </aside>

        <main class="login-form-container">
            <form id="loginForm" class="login-card">
                <h2>Bienvenido/a</h2>
                <p>Ingrese sus credenciales institucionales para continuar</p>
                
                <label for="email">Correo Electrónico Institucional</label>
                <input type="email" id="email" placeholder="usuario@uleam.edu.ec" required>
                
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
                
                <button type="submit">Iniciar Sesión</button>
            </form>
        </main>
    </div>
    <script src="shared/js/storage.js"></script>
    <script src="shared/js/auth.js"></script>
    <script src="shared/js/login.js"></script>
</body>
</html>
