<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Portal Empleado</title>
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="../css/contacto.css">
    <link rel="stylesheet" href="../css/inicio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="layout-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <p class="user-name" id="user-side-name">Cargando...</p>
                    <p class="user-role" id="user-side-role">Cargando...</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Inicio</a>
                <a href="requisitos.html" class="nav-item"><i class="fa-solid fa-file-lines"></i> Requisitos</a>
                <a href="nueva-solicitud.html" class="nav-item"><i class="fa-solid fa-plus-circle"></i> Nueva Solicitud</a>
                <a href="mis-solicitudes.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Mis Solicitudes</a>
                <a href="contacto.html" class="nav-item active"><i class="fa-solid fa-envelope"></i> Contacto</a>
            </nav>

            <div class="sidebar-footer">
                <button id="btnLogout" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Contactar Administración</h1>
                <p>Envíe sus dudas o consultas al equipo de Talento Humano</p>
            </header>

            <div class="contact-grid">
                <div class="form-card">
                    <h3>Nuevo Mensaje</h3>
                    <form id="contactoForm">
                        <div class="form-group">
                            <label>Asunto</label>
                            <input type="text" id="asunto" placeholder="Ej: Consulta sobre requisitos de SP4" required>
                        </div>
                        <div class="form-group">
                            <label>Mensaje</label>
                            <textarea id="mensaje" rows="6" placeholder="Escriba aquí su consulta detallada..." required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Enviar Mensaje</button>
                    </form>
                </div>

                <div class="history-card">
                    <h3>Historial de Consultas</h3>
                    <div id="historialMensajes" class="message-list">
                        <p class="empty-state">No tiene consultas previas.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../shared/js/storage.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../js/conacto.js"></script>
</body>
</html>
